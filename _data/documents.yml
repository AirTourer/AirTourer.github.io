# Registry of PDF documents.
# Add entries here and place the PDF file in the docs/ directory.
#
# Fields:
#   title:       Display title
#   description: Short description shown in the listing
#   category:    Grouping category (e.g. maintenance, service-bulletin, airworthiness)
#   path:        Path to the PDF file relative to site root
#   viewer:      (optional) Path to a viewer page for in-browser reading
#
# Example:
# - title: "Maintenance Manual"
#   description: "Complete maintenance manual for AirTourer T3 and T4 series"
#   category: maintenance
#   path: /docs/maintenance-manual.pdf
#   viewer: /view/maintenance-manual/

- title: "Airtourer Maintenance Manual"
  description: "Complete maintenance, repair, and overhaul manual for Airtourer aircraft (Reprint March 2007)"
  category: maintenance
  path: /docs/Airtourer Maintenance Manual.pdf
  viewer: /view/airtourer-maintenance-manual/

- title: "Airtourer Maintenance Manual (Markdown)"
  description: "Web-readable version of the Airtourer maintenance, repair, and overhaul manual"
  category: maintenance
  path: /docs/Airtourer Maintenance Manual.md

- title: "Airtourer T6 - CAA Approved Flight Manual and POH"
  description: "CAA approved flight manual and pilot's operating handbook for the Airtourer T6 (Document AIR 2792)"
  category: flight-manual
  path: /docs/Airtourer T6 - CAA Approved Flight Manual and POH.pdf
  viewer: /view/airtourer-t6-flight-manual/

- title: "Airtourer T6 - Flight Manual and POH (Markdown)"
  description: "Web-readable version of the CAA approved flight manual and pilot's operating handbook for the Airtourer T6"
  category: flight-manual
  path: /docs/Airtourer T6 - CAA Approved Flight Manual and POH.md

- title: "Airworthiness Directive Schedule - NZ Aerospace Airtourer Series"
  description: "Airworthiness directive schedule for NZ Aerospace Airtourer series aircraft, issued by the Civil Aviation Authority of New Zealand (26 October 2000)"
  category: airworthiness
  path: /docs/Airworthiness Directive Schedule - NZ Aerospace Airtourer Series.pdf
  viewer: /view/airworthiness-directive-schedule/

- title: "Airworthiness Directive Schedule (Markdown)"
  description: "Web-readable version of the airworthiness directive schedule for NZ Aerospace Airtourer series aircraft"
  category: airworthiness
  path: /docs/Airworthiness Directive Schedule - NZ Aerospace Airtourer Series.md
