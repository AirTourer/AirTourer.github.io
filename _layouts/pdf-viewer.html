---
layout: default
---
<article class="pdf-viewer-page">
  <header class="doc-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="doc-description">{{ page.description }}</p>{% endif %}
  </header>
  <div class="pdf-actions">
    <a href="{{ page.pdf_path | relative_url }}" download class="btn btn-download">Download PDF</a>
    <a href="{{ '/' | relative_url }}">&larr; Back to all documents</a>
  </div>
  <div class="pdf-container">
    <object data="{{ page.pdf_path | relative_url }}" type="application/pdf" width="100%" height="800px">
      <p>Your browser does not support embedded PDFs.
        <a href="{{ page.pdf_path | relative_url }}" download>Download the PDF</a> instead.
      </p>
    </object>
  </div>
</article>
