---
layout: default
---
<article class="doc-content">
  <header class="doc-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="doc-description">{{ page.description }}</p>{% endif %}
    <div class="doc-meta">
      {% if page.category %}<span class="doc-category">{{ page.category }}</span>{% endif %}
      {% if page.date %}<time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %B %Y" }}</time>{% endif %}
    </div>
  </header>
  {{ content }}
  <footer class="doc-footer">
    <a href="{{ '/' | relative_url }}">&larr; Back to all documents</a>
  </footer>
</article>
